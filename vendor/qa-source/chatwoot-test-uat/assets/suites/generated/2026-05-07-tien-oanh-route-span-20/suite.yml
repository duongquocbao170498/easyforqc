suite_name: "tien_oanh_route_span_20"
generated_at: "2026-05-07T12:00:00+07:00"
goal_summary: "Twenty Tiến Oanh route-span Chatwoot cases. Each case starts by asking what trips the operator has, then the adaptive planner drills into trip, time, seats, passenger mapping, fare, pickup/dropoff, and booking confirmation."
defaults:
  webhook_url: "http://localhost:3000/webhook/chatwoot"
  chat_ui_mode: "realistic"
  ui_inbox_id: null
  inbox_id: null
  captain_assistant_id: null
  labels:
    - "ai"
    - "bus"
    - "booking"
    - "tien-oanh"
    - "route-span"
  assignee_name: "Bot"
  reply_timeout_seconds: 600
  reply_settle_seconds: 3
  poll_interval_seconds: 2

success_stop: &success_stop
  - "(?i)https?://\\S+"
