goal_summary: >
  UAT route-span discovery suite for Tiến Oanh. Each case starts by asking
  what trips are available on a route/date, then drills into a selected trip
  to verify departure time, seat count, passenger identity, fare, origin,
  pickup point, and dropoff/route-span handling before checkout.
