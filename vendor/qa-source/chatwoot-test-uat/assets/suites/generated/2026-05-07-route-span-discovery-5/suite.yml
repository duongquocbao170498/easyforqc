  - case_id: route-span-01-sgn-dalat-0500
    title: Sài Gòn - Đà Lạt hỏi danh sách rồi chọn 05:00
    objective: >
      User first asks for available Tiến Oanh trips from Sài Gòn to Đà Lạt,
      then selects the 05:00 trip and verifies pickup/dropoff, seat, fare,
      passenger name, and checkout.
    opening_prompt: Nhà xe Tiến Oanh tuyến Sài Gòn đi Đà Lạt ngày 01-05-2026 có những chuyến nào vậy em?
    stop_regex_any:
      - (?i)https?://\S+
      - (?i)(mã vé|ticket code|booking code|mã đặt chỗ|mã booking).*[A-Z0-9]{5,12}
    contact:
      name: Nguyen Van Route One
      phone: "0908100001"
      email: qa.route.span.1@example.com
    metadata:
      operator_name: Tiến Oanh
      departure_date: "2026-05-01"
      route_name: Sài Gòn - Đà Lạt
      preferred_times: ["05:00"]
      preferred_pickup: Bến Xe Miền Đông Mới
      preferred_dropoff: Ngã 3 Madagui
      ticket_count: 1
      route_span_case: true
      case_kind: discovery-then-booking
    steps:
      - prompt: Nhà xe Tiến Oanh tuyến Sài Gòn đi Đà Lạt ngày 01-05-2026 có những chuyến nào vậy em?
        expectation:
          contains_any:
            - Sài Gòn
            - Đà Lạt
            - chuyến
            - Tiến Oanh
          regex_any:
            - "(?i)(05:00|05h00|5:00|5h)"
      - prompt: Anh muốn xem kỹ chuyến 05:00, còn ghế không và đi xe hạng gì?
        expectation:
          contains_any:
            - "05:00"
            - "05h00"
            - ghế
            - Limousine
            - Phòng
      - prompt: Anh đi 1 vé, đón ở Bến Xe Miền Đông Mới, trả ở Ngã 3 Madagui. Em báo lại giá vé và điểm đi/điểm trả giúp anh.
        expectation:
          contains_any:
            - Bến Xe Miền Đông Mới
            - Ngã 3 Madagui
            - giá
            - vé
      - prompt: Hành khách tên Nguyễn Văn Route One, số điện thoại 0908100001. Em đặt giúp anh chuyến này nhé.
        expectation:
          contains_any:
            - Nguyễn Văn Route One
            - 0908100001
            - thanh toán
            - đặt vé
            - xác nhận

