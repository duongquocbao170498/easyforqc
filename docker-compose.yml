services:
  qa-test-studio:
    build: .
    container_name: qa-test-studio
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-5173}:5173"
    environment:
      APP_ADMIN_EMAIL: "${APP_ADMIN_EMAIL:-qa@gmail.com}"
      APP_ADMIN_PASSWORD: "${APP_ADMIN_PASSWORD:?Set APP_ADMIN_PASSWORD in .env before starting}"
      APP_SESSION_SECRET: "${APP_SESSION_SECRET:?Set APP_SESSION_SECRET in .env before starting}"
      SETTINGS_ENCRYPTION_SECRET: "${SETTINGS_ENCRYPTION_SECRET:-}"
      APP_COOKIE_SECURE: "${APP_COOKIE_SECURE:-}"
      EXPOSE_DEBUG_DETAILS: "${EXPOSE_DEBUG_DETAILS:-false}"
      DISPLAY_HOST: "${DISPLAY_HOST:-qa-studio.local}"
      JIRA_BASE_URL: "${JIRA_BASE_URL:-https://jira.vexere.net}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL:-}"
      GOOGLE_ALLOWED_EMAILS: "${GOOGLE_ALLOWED_EMAILS:-}"
      QA_SOURCE_ROOT: "/app/vendor/qa-source"
      CHATWOOT_UAT_SKILL_ROOT: "${CHATWOOT_UAT_SKILL_ROOT:-/app/vendor/qa-source/chatwoot-test-uat}"
      CHATWOOT_UAT_INBOX_ID: "${CHATWOOT_UAT_INBOX_ID:-3062}"
      CHATWOOT_UAT_UI_INBOX_ID: "${CHATWOOT_UAT_UI_INBOX_ID:-3062}"
      CHATWOOT_UAT_CAPTAIN_ASSISTANT_ID: "${CHATWOOT_UAT_CAPTAIN_ASSISTANT_ID:-80}"
      CHATWOOT_UAT_DEFAULT_WEBHOOK_URL: "${CHATWOOT_UAT_DEFAULT_WEBHOOK_URL:-http://host.docker.internal:3000/webhook/chatwoot}"
      CHATWOOT_UAT_DEFAULT_HEALTHCHECK_URL: "${CHATWOOT_UAT_DEFAULT_HEALTHCHECK_URL:-http://host.docker.internal:3000/health}"
      DATABASE_URL: "postgres://qa_studio:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting}@postgres:5432/qa_studio"
    volumes:
      - qa_runs:/app/.qa-runs
      - ./qa:/app/qa
      - ${SKILLS_CONFIG_DIR:-${HOME}/.skills}:/home/node/.skills:ro

  postgres:
    image: postgres:16-alpine
    container_name: qa-test-studio-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: qa_studio
      POSTGRES_USER: qa_studio
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_studio -d qa_studio"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: qa-test-studio-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@example.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env before starting}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  qa_runs:
  postgres_data:
  pgadmin_data:
